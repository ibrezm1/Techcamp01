<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techcamp Applab Adventure - Image Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --secondary-bg: #475569;
            --img-bg: #000;
            --checker-color: #1e293b;
            --text-muted: #94a3b8;
            --img-name-color: #cbd5e1;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --secondary-bg: #cbd5e1;
            --img-bg: #f1f5f9;
            --checker-color: #e2e8f0;
            --text-muted: #475569;
            --img-name-color: #334155;
        }


        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 2rem;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: 9999px;
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #searchInput:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .image-card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-color);
        }

        .image-wrapper {
            position: relative;
            padding-top: 75%;
            /* 4:3 aspect ratio */
            background-color: var(--img-bg);
            overflow: hidden;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 0.5rem;
            box-sizing: border-box;
            background: repeating-conic-gradient(var(--checker-color) 0% 25%, transparent 0% 50%) 50% / 20px 20px;
        }

        .card-content {
            padding: 1.25rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .image-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 1rem;
            word-break: break-all;
            color: var(--img-name-color);
        }

        .copy-btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .copy-btn:hover {
            background-color: var(--accent-hover);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        .copy-btn.copied {
            background-color: #10b981;
            /* green result */
        }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 3rem;
        }

        .hidden {
            display: none !important;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            background-color: var(--secondary-bg);
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-hover);
        }

        .tab-btn:hover:not(.active) {
            background-color: var(--border-color);
        }

        /* --- FILTERS --- */
        .filters-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .filter-chip {
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-chip:hover {
            transform: translateY(-1px);
        }

        .filter-chip.active {
            box-shadow: 0 0 0 2px var(--text-color);
            border-color: var(--text-color);
            font-weight: 600;
        }

        /* --- FUNCTIONS LIST --- */
        .functions-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .function-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-family: monospace;
            font-size: 1.05rem;
            color: #0f172a; /* Force dark text since backgrounds are light */
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .function-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .function-name {
            font-weight: 600;
        }

        .function-toolbox {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            color: #0f172a;
        }

        .links-section {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .link-chip {
            background-color: var(--card-bg);
            color: var(--text-color);
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .link-chip:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Asset Gallery</h1>
            <p class="subtitle">Search and copy raw image URLs for your Applab projects</p>
            <button id="themeToggle" class="theme-toggle" title="Toggle Light/Dark Mode"
                aria-label="Toggle Light/Dark Mode">
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg id="sunIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="assetsSection">🖼️ Assets</button>
            <button class="tab-btn" data-target="functionsSection">📜 Functions</button>
        </div>

        <div id="assetsSection">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for images (e.g. unicorn, piggy, cat)...">
            </div>

        <div class="links-section">
            <a href="https://code.org/en-US/tools/app-lab" target="_blank" rel="noopener noreferrer" class="link-chip">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
                Code.org App Lab
            </a>
            <a href="https://studio.code.org/courses/applab-intro/units/1/lessons/1/levels/1?viewAs=Participant"
                target="_blank" rel="noopener noreferrer" class="link-chip">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                </svg>
                App Lab Intro Course
            </a>
        </div>

        <div id="loading">Loading images...</div>
        <div class="gallery" id="imageGallery"></div>
        </div> <!-- End assetsSection -->

        <div id="functionsSection" class="hidden">
            <div class="search-container">
                <input type="text" id="funcSearchInput" placeholder="Search functions (e.g. onEvent, Math.random)...">
            </div>
            
            <div class="filters-container" id="filtersContainer">
                <button class="filter-chip active" data-filter="All">All</button>
                <button class="filter-chip" data-filter="UI controls" style="background-color: #fef08a; color: #0f172a; border-color: #fef08a;">UI controls</button>
                <button class="filter-chip" data-filter="Data" style="background-color: #fecaca; color: #0f172a; border-color: #fecaca;">Data</button>
                <button class="filter-chip" data-filter="Control" style="background-color: #bfdbfe; color: #0f172a; border-color: #bfdbfe;">Control</button>
                <button class="filter-chip" data-filter="Variables" style="background-color: #e9d5ff; color: #0f172a; border-color: #e9d5ff;">Variables</button>
                <button class="filter-chip" data-filter="Canvas" style="background-color: #fbcfe8; color: #0f172a; border-color: #fbcfe8;">Canvas</button>
                <button class="filter-chip" data-filter="Turtle" style="background-color: #ccfbf1; color: #0f172a; border-color: #ccfbf1;">Turtle</button>
                <button class="filter-chip" data-filter="Math" style="background-color: #ffedd5; color: #0f172a; border-color: #ffedd5;">Math</button>
                <button class="filter-chip" data-filter="Functions" style="background-color: #bbf7d0; color: #0f172a; border-color: #bbf7d0;">Functions</button>
            </div>

            <div id="funcLoading" style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading functions...</div>
            <div class="functions-grid" id="functionGallery"></div>
        </div>

        <div class="footer">
            Techcamp Applab Adventure Assets
        </div>
    </div>

    <script>
        const REPO_BASE = "https://raw.githubusercontent.com/ibrezm1/Techcamp-ApplabAdventure/refs/heads/main/";
        let allImages = [];

        const gallery = document.getElementById('imageGallery');
        const searchInput = document.getElementById('searchInput');
        const loading = document.getElementById('loading');

        async function loadImages() {
            try {
                const response = await fetch('images.json');
                if (!response.ok) throw new Error('Failed to load images.json');
                allImages = await response.json();

                loading.classList.add('hidden');
                renderGallery(allImages);
            } catch (error) {
                console.error('Error:', error);
                loading.textContent = 'Error loading images. Please try again.';
            }
        }

        function renderGallery(images) {
            gallery.innerHTML = '';

            if (images.length === 0) {
                gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">No images found matching your search.</div>';
                return;
            }

            const fragment = document.createDocumentFragment();

            images.forEach(imagePath => {
                const rawUrl = `${REPO_BASE}${imagePath}?raw=true`;
                const fileName = imagePath.split('/').pop();

                const card = document.createElement('div');
                card.className = 'image-card';

                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${imagePath}" alt="${fileName}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="image-name" title="${imagePath}">${imagePath}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${rawUrl}', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Raw URL
                        </button>
                    </div>
                `;

                fragment.appendChild(card);
            });

            gallery.appendChild(fragment);
        }

        window.copyToClipboard = async function (text, btnElement) {
            try {
                await navigator.clipboard.writeText(text);
                const originalHtml = btnElement.innerHTML;

                btnElement.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Copied!
                `;
                btnElement.classList.add('copied');

                setTimeout(() => {
                    btnElement.innerHTML = originalHtml;
                    btnElement.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);

                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const originalHtml = btnElement.innerHTML;
                    btnElement.innerHTML = `Copied!`;
                    btnElement.classList.add('copied');
                    setTimeout(() => {
                        btnElement.innerHTML = originalHtml;
                        btnElement.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    alert('Failed to copy. ' + text);
                }
                document.body.removeChild(textArea);
            }
        };

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allImages.filter(img => img.toLowerCase().includes(searchTerm));
            renderGallery(filtered);
        });

        // Theme Toggle Logic
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');

        // Check for saved theme preference or system preference
        const getPreferredTheme = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                return savedTheme;
            }
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        };

        const setTheme = (theme) => {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                document.documentElement.removeAttribute('data-theme');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            localStorage.setItem('theme', theme);
        };

        // Initialize theme
        setTheme(getPreferredTheme());

        themeToggle.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            setTheme(isLight ? 'dark' : 'light');
        });

        // ================= Tab Switching Logic =================
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.getElementById('assetsSection').classList.add('hidden');
                document.getElementById('functionsSection').classList.add('hidden');
                
                const target = btn.getAttribute('data-target');
                document.getElementById(target).classList.remove('hidden');
            });
        });

        // ================= Functions Logic =================
        let allFunctions = [];
        let currentFuncFilter = "All";
        const functionGallery = document.getElementById('functionGallery');
        const funcSearchInput = document.getElementById('funcSearchInput');
        const funcLoading = document.getElementById('funcLoading');

        async function loadFunctions() {
            try {
                const response = await fetch('functions.json');
                if (!response.ok) throw new Error('Failed to load functions.json');
                allFunctions = await response.json();
                
                funcLoading.classList.add('hidden');
                renderFunctions(allFunctions);
            } catch (error) {
                console.error('Error:', error);
                funcLoading.textContent = 'Error loading functions. Please try again.';
            }
        }

        function renderFunctions(functionsList) {
            functionGallery.innerHTML = '';
            
            if (functionsList.length === 0) {
                functionGallery.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">No functions found matching your search.</div>';
                return;
            }

            const fragment = document.createDocumentFragment();

            functionsList.forEach(func => {
                const row = document.createElement('div');
                row.className = 'function-row';
                row.style.backgroundColor = func.color;
                
                row.innerHTML = `
                    <div class="function-name">${func.name}</div>
                    <div class="function-toolbox">${func.toolbox}</div>
                `;
                
                row.addEventListener('click', () => {
                    const originalText = row.querySelector('.function-toolbox').textContent;
                    
                    navigator.clipboard.writeText(func.name).then(() => {
                        row.querySelector('.function-toolbox').textContent = 'Copied!';
                        row.querySelector('.function-toolbox').style.backgroundColor = '#10b981';
                        row.querySelector('.function-toolbox').style.color = 'white';
                        
                        setTimeout(() => {
                            row.querySelector('.function-toolbox').textContent = originalText;
                            row.querySelector('.function-toolbox').style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                            row.querySelector('.function-toolbox').style.color = '#0f172a';
                        }, 2000);
                    });
                });
                
                fragment.appendChild(row);
            });

            functionGallery.appendChild(fragment);
        }

        function filterFunctions() {
            const searchTerm = funcSearchInput.value.toLowerCase();
            const filtered = allFunctions.filter(func => {
                const matchesSearch = func.name.toLowerCase().includes(searchTerm);
                const matchesCategory = currentFuncFilter === "All" || func.toolbox === currentFuncFilter;
                return matchesSearch && matchesCategory;
            });
            renderFunctions(filtered);
        }

        funcSearchInput.addEventListener('input', filterFunctions);

        const filterChips = document.querySelectorAll('.filter-chip');
        filterChips.forEach(chip => {
            chip.addEventListener('click', () => {
                filterChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFuncFilter = chip.getAttribute('data-filter');
                filterFunctions();
            });
        });

        // Initialize Call
        loadFunctions();

        // Initialize
        loadImages();
    </script>
</body>

</html>
